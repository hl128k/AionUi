name: '✓PR Checks'

on:
  pull_request:
    types: [opened, synchronize, edited]
    branches: [main, dev]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'

jobs:
  # Job 1: Code quality checks (TypeScript, ESLint, Prettier)
  code-quality:
    name: Code Quality
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Install prek
        run: npm install -g @j178/prek

      - name: Run prek checks
        run: prek run --from-ref origin/${{ github.base_ref }} --to-ref HEAD

  # Job 2: Unit tests across all platforms
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    if: github.event.action != 'edited'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-2022]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Run extension system tests
        run: bunx vitest run

  # ──────────────────────────────────────────────────────────
  # Job 3: Build – compile & package on all 5 platform targets
  # Uploads the *-unpacked directories as artifacts so that
  # downstream jobs (build-verify, e2e-tests) can reuse them.
  # ──────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    if: github.event.action != 'edited'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-arm64'
            os: 'macos-14'
            arch: 'arm64'
            target: '--mac'
            build_args: '--mac --arm64'
            unpacked_dir: 'mac-arm64'
          - platform: 'macos-x64'
            os: 'macos-14'
            arch: 'x64'
            target: '--mac'
            build_args: '--mac --x64'
            unpacked_dir: 'mac'
          - platform: 'windows-x64'
            os: 'windows-2022'
            arch: 'x64'
            target: '--win'
            build_args: '--win --x64'
            unpacked_dir: 'win-unpacked'
          - platform: 'windows-arm64'
            os: 'windows-2022'
            arch: 'arm64'
            target: '--win'
            build_args: '--win --arm64'
            unpacked_dir: 'win-arm64-unpacked'
          - platform: 'linux'
            os: 'ubuntu-latest'
            arch: 'x64'
            target: '--linux'
            build_args: '--linux --x64'
            unpacked_dir: 'linux-unpacked'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-pip pkg-config libsqlite3-dev fakeroot dpkg-dev rpm

      - name: Get Electron version
        id: electron-version
        shell: bash
        run: |
          ELECTRON_VERSION=$(node -p "require('./package.json').devDependencies.electron.replace(/[\^~]/g, '')")
          echo "version=$ELECTRON_VERSION" >> $GITHUB_OUTPUT
          echo "Electron version: $ELECTRON_VERSION"

      # Restore Electron/Electron-Builder caches before install-app-deps
      - name: Cache Electron artifacts
        id: electron-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/.cache/electron
            ${{ runner.temp }}/.cache/electron-builder
            ~/.cache/electron
            ~/.cache/electron-builder
            ${{ env.LOCALAPPDATA }}\electron-builder\Cache
          key: electron-cache-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('package.json', 'bun.lock') }}
          restore-keys: |
            electron-cache-${{ matrix.platform }}-${{ matrix.arch }}-
            electron-cache-${{ matrix.platform }}-

      - name: Cache status
        run: echo "electron-cache-hit=${{ steps.electron-cache.outputs.cache-hit }}"

      - name: Rebuild native modules for Electron (non-Windows)
        if: "!startsWith(matrix.platform, 'windows')"
        run: bunx electron-builder install-app-deps
        env:
          npm_config_runtime: electron
          npm_config_disturl: https://electronjs.org/headers
          ELECTRON_CACHE: ${{ runner.temp }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/.cache/electron-builder

      - name: Setup MSBuild (Windows only)
        if: startsWith(matrix.platform, 'windows')
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'

      - name: Build (Windows x64)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        run: |
          Write-Host "=========================================="
          Write-Host "BUILD: ${{ matrix.platform }}"
          Write-Host "=========================================="
          just build-win-x64
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          MSVS_VERSION: 2022
          GYP_MSVS_VERSION: 2022
          WindowsTargetPlatformVersion: 10.0.19041.0
          CI: true

      - name: Build (Windows arm64)
        if: matrix.platform == 'windows-arm64'
        shell: pwsh
        run: |
          Write-Host "=========================================="
          Write-Host "BUILD: ${{ matrix.platform }}"
          Write-Host "=========================================="
          just build-win-arm64
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          MSVS_VERSION: 2022
          GYP_MSVS_VERSION: 2022
          WindowsTargetPlatformVersion: 10.0.19041.0
          CI: true

      - name: Build (non-Windows)
        if: "!startsWith(matrix.platform, 'windows')"
        shell: bash
        run: |
          echo "=========================================="
          echo "BUILD: ${{ matrix.platform }}"
          echo "=========================================="
          node scripts/build-with-builder.js auto ${{ matrix.build_args }}
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
          npm_config_runtime: electron
          npm_config_target: ${{ steps.electron-version.outputs.version }}
          npm_config_disturl: https://electronjs.org/headers
          CI: true

      - name: Verify packaged i18n assets
        run: bun run test:packaged:i18n

      - name: Verify build artifacts exist
        shell: bash
        run: |
          echo "=========================================="
          echo "VERIFY ARTIFACTS: ${{ matrix.platform }}"
          echo "=========================================="
          ls -lah out || true

          case "${{ matrix.platform }}" in
            windows-*)
              ls out/*.exe out/*latest*.yml >/dev/null
              ;;
            macos-*)
              ls out/*.dmg out/*.zip out/*latest*.yml >/dev/null
              ;;
            linux)
              ls out/*.AppImage out/*.deb out/*latest*.yml >/dev/null
              ;;
          esac

      # Detect the actual unpacked directory name produced by electron-builder.
      # On macOS, cross-compiling for a different arch may produce 'mac-x64'
      # instead of 'mac', so we probe all known candidates.
      - name: Detect unpacked directory
        id: detect-unpacked
        shell: bash
        run: |
          EXPECTED="out/${{ matrix.unpacked_dir }}"
          if [ -d "$EXPECTED" ]; then
            echo "dir=$EXPECTED" >> $GITHUB_OUTPUT
            echo "Found expected unpacked dir: $EXPECTED"
          else
            echo "Expected dir '$EXPECTED' not found, scanning candidates..."
            ls -la out/
            case "${{ matrix.platform }}" in
              macos-*)
                for d in mac mac-arm64 mac-x64 mac-universal; do
                  if [ -d "out/$d" ]; then
                    echo "dir=out/$d" >> $GITHUB_OUTPUT
                    echo "Found unpacked dir: out/$d"
                    exit 0
                  fi
                done
                ;;
              windows-*)
                for d in win-unpacked win-x64-unpacked win-arm64-unpacked; do
                  if [ -d "out/$d" ]; then
                    echo "dir=out/$d" >> $GITHUB_OUTPUT
                    echo "Found unpacked dir: out/$d"
                    exit 0
                  fi
                done
                ;;
              linux)
                for d in linux-unpacked linux-x64-unpacked linux-arm64-unpacked; do
                  if [ -d "out/$d" ]; then
                    echo "dir=out/$d" >> $GITHUB_OUTPUT
                    echo "Found unpacked dir: out/$d"
                    exit 0
                  fi
                done
                ;;
            esac
            echo "::error::No unpacked directory found for ${{ matrix.platform }}"
            exit 1
          fi

      # Upload the unpacked directory for downstream jobs (e2e-tests, build-verify)
      - name: Upload unpacked app artifact
        uses: actions/upload-artifact@v6
        with:
          name: unpacked-${{ matrix.platform }}
          path: ${{ steps.detect-unpacked.outputs.dir }}/
          retention-days: 1
          if-no-files-found: error

      # Upload installers/packages for build-verify smoke tests
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v6
        with:
          name: installers-${{ matrix.platform }}
          path: |
            out/*.exe
            out/*.dmg
            out/*.zip
            out/*.AppImage
            out/*.deb
            out/*latest*.yml
          retention-days: 1
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────
  # Job 3b: Build Verify – download build artifacts & run
  # smoke tests (silent install, version check, etc.)
  # ──────────────────────────────────────────────────────────
  build-verify:
    name: Verify (${{ matrix.platform }})
    needs: [build]
    if: github.event.action != 'edited'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-x64'
            os: 'windows-2022'
          - platform: 'windows-arm64'
            os: 'windows-2022'
          - platform: 'macos-arm64'
            os: 'macos-14'
          - platform: 'macos-x64'
            os: 'macos-14'
          - platform: 'linux'
            os: 'ubuntu-latest'
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v6
        with:
          name: installers-${{ matrix.platform }}
          path: out/

      - name: List downloaded artifacts
        shell: bash
        run: ls -lah out/

      - name: Silent install smoke test (Windows x64)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        run: |
          Write-Host "=========================================="
          Write-Host "SMOKE INSTALL: windows-x64"
          Write-Host "=========================================="

          $installer = Get-ChildItem -Path out -Filter "AionUi-*-win-*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer found in out/"
          }

          Write-Host "Using installer: $($installer.FullName)"
          Start-Process -FilePath $installer.FullName -ArgumentList '/S' -Wait -NoNewWindow

          $candidates = @(
            "$env:LOCALAPPDATA\Programs\AionUi\AionUi.exe",
            "$env:ProgramFiles\AionUi\AionUi.exe",
            "$env:ProgramFiles(x86)\AionUi\AionUi.exe"
          )

          $installedExe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $installedExe) {
            throw "Silent install finished but app executable not found in expected locations"
          }

          Write-Host "Installed executable: $installedExe"

      - name: Skip executable smoke for Windows arm64 cross build
        if: matrix.platform == 'windows-arm64'
        shell: pwsh
        run: |
          Write-Host "Skipping runtime install smoke for windows-arm64: runner is windows-x64, cannot reliably execute arm64 installer."
          Get-ChildItem -Path out -Filter "AionUi-*-win-*.exe" | Format-Table Name, Length

      - name: Install smoke test (macOS arm64)
        if: matrix.platform == 'macos-arm64'
        shell: bash
        run: |
          set -euo pipefail
          echo "=========================================="
          echo "SMOKE INSTALL: macos-arm64"
          echo "=========================================="

          DMG_FILE=$(ls out/*.dmg | head -n 1)
          MOUNT_POINT="/tmp/aionui-smoke-mount"
          APP_DIR="/tmp/aionui-smoke-app"

          rm -rf "$MOUNT_POINT" "$APP_DIR"
          mkdir -p "$MOUNT_POINT" "$APP_DIR"

          hdiutil attach "$DMG_FILE" -nobrowse -mountpoint "$MOUNT_POINT"
          cp -R "$MOUNT_POINT"/*.app "$APP_DIR"/
          hdiutil detach "$MOUNT_POINT"

          APP_PATH=$(ls -d "$APP_DIR"/*.app | head -n 1)
          APP_BIN="$APP_PATH/Contents/MacOS/AionUi"

          test -x "$APP_BIN"
          "$APP_BIN" --version || true

      - name: Skip executable smoke for macOS x64 cross build
        if: matrix.platform == 'macos-x64'
        shell: bash
        run: |
          echo "Skipping runtime launch smoke for macos-x64 cross build on arm64 runner."
          ls -lah out/*.dmg out/*.zip

      - name: Install smoke test (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "=========================================="
          echo "SMOKE INSTALL: linux"
          echo "=========================================="

          APPIMAGE_FILE=$(ls out/*.AppImage | head -n 1)
          chmod +x "$APPIMAGE_FILE"
          "$APPIMAGE_FILE" --appimage-extract-and-run --version || true

          DEB_FILE=$(ls out/*.deb | head -n 1)
          PKG_NAME=$(dpkg-deb -f "$DEB_FILE" Package)
          sudo dpkg -i "$DEB_FILE" || sudo apt-get install -f -y

          INSTALLED_BIN=$(dpkg -L "$PKG_NAME" | grep -Ei '/(bin|opt)/.*(aionui)$' | head -n 1 || true)
          if [ -z "$INSTALLED_BIN" ]; then
            echo "Package files:"
            dpkg -L "$PKG_NAME" | head -n 50
            echo "No installed executable path matched expected pattern"
            exit 1
          fi

          test -x "$INSTALLED_BIN"

