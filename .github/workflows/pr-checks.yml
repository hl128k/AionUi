  # Job 4b: Aggregate E2E results and comment on PR
  e2e-summary:
    name: E2E Summary
    needs: [e2e-tests]
    if: always() && github.event.action != 'edited'
    runs-on: ubuntu-latest
    steps:
      - name: Comment E2E results on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const runId = context.runId;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

            const e2eResult = '${{ needs.e2e-tests.result }}';
            const allPassed = e2eResult === 'success';
            const statusEmoji = allPassed ? '✅' : '❌';
            const artifactUrl = `${runUrl}#artifacts`;

            const platforms = [
              { name: 'Linux (ubuntu)', key: 'linux' },
              { name: 'macOS (arm64)', key: 'macos-arm64' },
              { name: 'Windows (x64)', key: 'windows-x64' },
            ];

            const body = [
              `<!-- e2e-report-bot -->`,
              `## ${statusEmoji} E2E Test Report (Packaged Mode)`,
              ``,
              `Tests run against **packaged app** built in the Build job to validate resource integrity.`,
              ``,
              `| Platform | Status |`,
              `|----------|--------|`,
              ...platforms.map(p => `| ${p.name} | ${allPassed ? '✅ Passed' : '⚠️ See logs'} |`),
              ``,
              `| Item | Detail |`,
              `|------|--------|`,
              `| **Overall** | ${statusEmoji} ${allPassed ? 'All platforms passed' : 'Some platforms failed'} |`,
              `| **Reports** | [Download HTML Reports](${artifactUrl}) |`,
              `| **Run** | [View Workflow Run](${runUrl}) |`,
              ``,
              `> 📥 Download the \`e2e-report-*\` artifacts to view interactive Playwright HTML reports:`,
              `> \`\`\``,
              `> npx playwright show-report path/to/downloaded/e2e-report-linux`,
              `> \`\`\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.includes('<!-- e2e-report-bot -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }

