name: '✓PR Checks'

on:
  pull_request:
    types: [opened, synchronize, edited]
    branches: [main, dev]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: read

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'

jobs:
  # Job 1: Code quality checks (TypeScript, ESLint, Prettier)
  code-quality:
    name: Code Quality
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --no-frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Install prek
        run: npm install -g @j178/prek

      - name: Run prek checks
        run: prek run --from-ref origin/${{ github.base_ref }} --to-ref HEAD

  # Job 2: Unit tests across all platforms
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    if: github.event.action != 'edited'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-2022]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --no-frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Run extension system tests
        run: bunx vitest run

  # Job 3: Build test across all platforms (parallel with code-quality and unit-tests)
  build-test:
    name: Build Test (${{ matrix.platform }})
    if: github.event.action != 'edited'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-arm64'
            os: 'macos-14'
            arch: 'arm64'
            target: '--mac'
            build_args: '--mac --arm64'
          - platform: 'macos-x64'
            os: 'macos-14'
            arch: 'x64'
            target: '--mac'
            build_args: '--mac --x64'
          - platform: 'windows-x64'
            os: 'windows-2022'
            arch: 'x64'
            target: '--win'
            build_args: '--win --x64'
          - platform: 'windows-arm64'
            os: 'windows-2022'
            arch: 'arm64'
            target: '--win'
            build_args: '--win --arm64'
          - platform: 'linux'
            os: 'ubuntu-latest'
            arch: 'x64'
            target: '--linux'
            build_args: '--linux --x64'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: bun install --no-frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-pip pkg-config libsqlite3-dev fakeroot dpkg-dev rpm libnss3-dev libatk-bridge2.0-dev libdrm2 libxkbcommon-dev libxss1 libatspi2.0-dev libgtk-3-dev libxrandr2 libasound2-dev

      - name: Get Electron version
        id: electron-version
        shell: bash
        run: |
          ELECTRON_VERSION=$(node -p "require('./package.json').devDependencies.electron.replace(/[\^~]/g, '')")
          echo "version=$ELECTRON_VERSION" >> $GITHUB_OUTPUT
          echo "Electron version: $ELECTRON_VERSION"

      # Restore Electron/Electron-Builder caches before install-app-deps
      - name: Cache Electron artifacts
        id: electron-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/.cache/electron
            ${{ runner.temp }}/.cache/electron-builder
            ~/.cache/electron
            ~/.cache/electron-builder
            ${{ env.LOCALAPPDATA }}\electron-builder\Cache
          key: electron-cache-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('package.json', 'bun.lock') }}
          restore-keys: |
            electron-cache-${{ matrix.platform }}-${{ matrix.arch }}-
            electron-cache-${{ matrix.platform }}-

      - name: Cache status
        run: echo "electron-cache-hit=${{ steps.electron-cache.outputs.cache-hit }}"

      - name: Rebuild native modules for Electron (non-Windows)
        if: "!startsWith(matrix.platform, 'windows')"
        run: bunx electron-builder install-app-deps
        env:
          npm_config_runtime: electron
          npm_config_disturl: https://electronjs.org/headers
          ELECTRON_CACHE: ${{ runner.temp }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/.cache/electron-builder

      - name: Setup MSBuild (Windows only)
        if: startsWith(matrix.platform, 'windows')
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'

      - name: Build test (Windows x64)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        run: |
          Write-Host "=========================================="
          Write-Host "BUILD TEST: ${{ matrix.platform }}"
          Write-Host "=========================================="
          just build-win-x64
          Write-Host "✓Build test passed for ${{ matrix.platform }}"
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          MSVS_VERSION: 2022
          GYP_MSVS_VERSION: 2022
          WindowsTargetPlatformVersion: 10.0.19041.0
          CI: true

      - name: Build test (Windows arm64)
        if: matrix.platform == 'windows-arm64'
        shell: pwsh
        run: |
          Write-Host "=========================================="
          Write-Host "BUILD TEST: ${{ matrix.platform }}"
          Write-Host "=========================================="
          just build-win-arm64
          Write-Host "✓Build test passed for ${{ matrix.platform }}"
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          MSVS_VERSION: 2022
          GYP_MSVS_VERSION: 2022
          WindowsTargetPlatformVersion: 10.0.19041.0
          CI: true

      - name: Build test (non-Windows)
        if: "!startsWith(matrix.platform, 'windows')"
        shell: bash
        run: |
          echo "=========================================="
          echo "BUILD TEST: ${{ matrix.platform }}"
          echo "=========================================="
          node scripts/build-with-builder.js auto ${{ matrix.build_args }}
          echo "✓Build test passed for ${{ matrix.platform }}"
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
          npm_config_runtime: electron
          npm_config_target: ${{ steps.electron-version.outputs.version }}
          npm_config_disturl: https://electronjs.org/headers
          CI: true

      - name: Verify packaged i18n assets
        run: bun run test:packaged:i18n

      - name: Verify build artifacts exist
        shell: bash
        run: |
          echo "=========================================="
          echo "VERIFY ARTIFACTS: ${{ matrix.platform }}"
          echo "=========================================="
          ls -lah out || true

          case "${{ matrix.platform }}" in
            windows-*)
              ls out/*.exe out/*latest*.yml >/dev/null
              ;;
            macos-*)
              ls out/*.dmg out/*.zip out/*latest*.yml >/dev/null
              ;;
            linux)
              ls out/*.AppImage out/*.deb out/*latest*.yml >/dev/null
              ;;
          esac

      - name: Silent install smoke test (Windows x64)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        run: |
          Write-Host "=========================================="
          Write-Host "SMOKE INSTALL: windows-x64"
          Write-Host "=========================================="

          $installer = Get-ChildItem -Path out -Filter "AionUi-*-win-*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer found in out/"
          }

          Write-Host "Using installer: $($installer.FullName)"
          Start-Process -FilePath $installer.FullName -ArgumentList '/S' -Wait -NoNewWindow

          $candidates = @(
            "$env:LOCALAPPDATA\Programs\AionUi\AionUi.exe",
            "$env:ProgramFiles\AionUi\AionUi.exe",
            "$env:ProgramFiles(x86)\AionUi\AionUi.exe"
          )

          $installedExe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $installedExe) {
            throw "Silent install finished but app executable not found in expected locations"
          }

          Write-Host "Installed executable: $installedExe"

      - name: Skip executable smoke for Windows arm64 cross build
        if: matrix.platform == 'windows-arm64'
        shell: pwsh
        run: |
          Write-Host "Skipping runtime install smoke for windows-arm64: runner is windows-x64, cannot reliably execute arm64 installer."
          Get-ChildItem -Path out -Filter "AionUi-*-win-*.exe" | Format-Table Name, Length

      - name: Install smoke test (macOS arm64)
        if: matrix.platform == 'macos-arm64'
        shell: bash
        run: |
          set -euo pipefail
          echo "=========================================="
          echo "SMOKE INSTALL: macos-arm64"
          echo "=========================================="

          DMG_FILE=$(ls out/*.dmg | head -n 1)
          MOUNT_POINT="/tmp/aionui-smoke-mount"
          APP_DIR="/tmp/aionui-smoke-app"

          rm -rf "$MOUNT_POINT" "$APP_DIR"
          mkdir -p "$MOUNT_POINT" "$APP_DIR"

          hdiutil attach "$DMG_FILE" -nobrowse -mountpoint "$MOUNT_POINT"
          cp -R "$MOUNT_POINT"/*.app "$APP_DIR"/
          hdiutil detach "$MOUNT_POINT"

          APP_PATH=$(ls -d "$APP_DIR"/*.app | head -n 1)
          APP_BIN="$APP_PATH/Contents/MacOS/AionUi"

          test -x "$APP_BIN"
          "$APP_BIN" --version || true

      - name: Skip executable smoke for macOS x64 cross build
        if: matrix.platform == 'macos-x64'
        shell: bash
        run: |
          echo "Skipping runtime launch smoke for macos-x64 cross build on arm64 runner."
          ls -lah out/*.dmg out/*.zip

      - name: Install smoke test (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "=========================================="
          echo "SMOKE INSTALL: linux"
          echo "=========================================="

          APPIMAGE_FILE=$(ls out/*.AppImage | head -n 1)
          chmod +x "$APPIMAGE_FILE"
          "$APPIMAGE_FILE" --appimage-extract-and-run --version || true

          DEB_FILE=$(ls out/*.deb | head -n 1)
          PKG_NAME=$(dpkg-deb -f "$DEB_FILE" Package)
          sudo dpkg -i "$DEB_FILE" || sudo apt-get install -f -y

          INSTALLED_BIN=$(dpkg -L "$PKG_NAME" | grep -Ei '/(bin|opt)/.*(aionui)$' | head -n 1 || true)
          if [ -z "$INSTALLED_BIN" ]; then
            echo "Package files:"
            dpkg -L "$PKG_NAME" | head -n 50
            echo "No installed executable path matched expected pattern"
            exit 1
          fi

          test -x "$INSTALLED_BIN"

  # Job 4: Test release scripts (fast, no build required)
  release-script-test:
    name: Release Script Test
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create mock build artifacts
        shell: bash
        run: bash scripts/create-mock-release-artifacts.sh build-artifacts

      - name: Run prepare-release-assets script
        shell: bash
        run: bash scripts/prepare-release-assets.sh build-artifacts release-assets

      - name: Validate script output
        shell: bash
        run: bash scripts/verify-release-assets.sh release-assets

  # Job 5: E2E Tests (Playwright + Electron)
  e2e-tests:
    name: E2E Tests
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --no-frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Install Linux dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3-dev libatk-bridge2.0-dev libdrm2 libxkbcommon-dev libxss1 libatspi2.0-dev libgtk-3-dev libxrandr2 libasound2-dev xvfb

      - name: Run E2E tests
        run: xvfb-run --auto-servernum bunx playwright test --config playwright.config.ts
        env:
          CI: true
          AIONUI_EXTENSIONS_PATH: ${{ github.workspace }}/examples

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-report
          path: tests/e2e/report/
          retention-days: 14

      - name: Upload E2E screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-screenshots
          path: tests/e2e/screenshots/
          retention-days: 14
          if-no-files-found: ignore

      - name: Comment E2E results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const runId = context.runId;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

            // Read Playwright exit status from job outcome
            const jobStatus = '${{ steps.run-e2e.outcome }}' || (process.exitCode === 0 ? 'success' : 'failure');
            const statusEmoji = jobStatus === 'success' ? '✅' : '❌';

            const artifactUrl = `${runUrl}#artifacts`;

            const body = [
              `<!-- e2e-report-bot -->`,
              `## ${statusEmoji} E2E Test Report`,
              ``,
              `| Item | Detail |`,
              `|------|--------|`,
              `| **Status** | ${statusEmoji} ${jobStatus === 'success' ? 'All tests passed' : 'Some tests failed'} |`,
              `| **Report** | [Download HTML Report](${artifactUrl}) |`,
              `| **Run** | [View Workflow Run](${runUrl}) |`,
              ``,
              `> 📥 Download the \`e2e-report\` artifact from the workflow run to view the interactive Playwright HTML report locally:`,
              `> \`\`\``,
              `> npx playwright show-report path/to/downloaded/e2e-report`,
              `> \`\`\``,
            ].join('\n');

            // Find existing comment to update (idempotent)
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.includes('<!-- e2e-report-bot -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }

  # Job 6: Trigger GPT AI review (only on first PR submission)
  review:
    name: AI Review
    needs: [code-quality, unit-tests, build-test, release-script-test, e2e-tests]
    if: github.event.action == 'opened' && needs.code-quality.result == 'success' && needs.unit-tests.result == 'success' && needs.build-test.result == 'success' && needs.release-script-test.result == 'success'
    uses: './.github/workflows/gpt-review.yml'
    with:
      pr_number: '${{ github.event.pull_request.number }}'
    permissions:
      contents: read
      pull-requests: write
    secrets: inherit

  # Job 7: Check if PR author is an external contributor
  check-external:
    name: Check External
    needs: [code-quality, unit-tests, build-test, release-script-test, e2e-tests]
    if: github.event.action == 'opened' && needs.code-quality.result == 'success' && needs.unit-tests.result == 'success' && needs.build-test.result == 'success' && needs.release-script-test.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      is_external: ${{ steps.check.outputs.is_external }}
    steps:
      - name: Check author permission level
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const username = context.payload.pull_request.user.login;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username,
              });
              const permission = data.permission;
              const isExternal = permission !== 'admin' && permission !== 'maintain' && permission !== 'write';
              core.info(`User ${username}: permission=${permission}, is external: ${isExternal}`);
              core.setOutput('is_external', String(isExternal));
            } catch (error) {
              core.info(`User ${username}: permission check failed (${error.message}), treating as external`);
              core.setOutput('is_external', 'true');
            }

  # Job 8: Trigger GPT PR assessment for external contributors
  assessment:
    name: PR Assessment
    needs: [check-external]
    if: needs.check-external.outputs.is_external == 'true'
    uses: './.github/workflows/gpt-pr-assessment.yml'
    with:
      pr_number: '${{ github.event.pull_request.number }}'
    permissions:
      contents: read
      pull-requests: write
      issues: read
    secrets: inherit
